<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>复古像素吃豆人</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="game-container">
        <h1 class="game-title">复古像素吃豆人</h1>
        <div class="game-info">
            <div class="score">得分: <span id="score">0</span></div>
            <div class="level">关卡: <span id="level">1</span></div>
            <div class="lives">生命: <span id="lives">3</span></div>
        </div>
        <canvas id="gameCanvas" width="560" height="620"></canvas>
        <div class="game-controls">
            <p>使用方向键控制吃豆人移动</p>
            <button id="startBtn">开始游戏</button>
            <button id="pauseBtn">暂停</button>
        </div>
        <div id="gameOver" class="game-over hidden">
            <h2>游戏结束!</h2>
            <p>最终得分: <span id="finalScore">0</span></p>
            <button id="restartBtn">重新开始</button>
        </div>
        <div id="levelUp" class="level-up hidden">
            <h2>关卡完成!</h2>
            <p>准备进入下一关...</p>
        </div>
    </div>
    <script type="module" src="js/main.js"></script>
</body>
</html>
